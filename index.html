<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HaxBall Tier List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
 
    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 0.3rem;
      color: #fff;
    }
 
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #8b949e;
      margin-bottom: 2rem;
    }
 
    .container {
      max-width: 820px;
      margin: 0 auto;
    }
 
    /* Tier rows */
    .tier-row {
      display: flex;
      align-items: stretch;
      margin-bottom: 6px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #30363d;
      min-height: 64px;
    }
 
    .tier-label {
      width: 60px;
      min-width: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }
 
    .tier-S  { background: #cf2222; }
    .tier-A  { background: #d4740a; }
    .tier-B  { background: #9a8e00; }
    .tier-C  { background: #2e7d32; }
    .tier-D  { background: #1565c0; }
 
    .tier-cells {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 10px;
      background: #161b22;
      align-content: flex-start;
      transition: background 0.15s;
    }
 
    .tier-cells.drag-over { background: #1c2d3a; }
 
    /* Player cards */
    .player-card {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #e6edf3;
      cursor: grab;
      user-select: none;
      transition: transform 0.1s, opacity 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
 
    .player-card:hover { border-color: #58a6ff; }
    .player-card:active { cursor: grabbing; transform: scale(0.96); }
    .player-card.dragging { opacity: 0.3; }
 
    /* Pool */
    .pool-section { margin-top: 20px; }
 
    .pool-label {
      font-size: 0.78rem;
      color: #8b949e;
      margin-bottom: 6px;
      text-align: right;
    }
 
    .pool-cells {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px;
      background: #161b22;
      border: 1px dashed #30363d;
      border-radius: 8px;
      min-height: 56px;
      transition: background 0.15s;
    }
 
    .pool-cells.drag-over { background: #1c2d3a; }
 
    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 18px;
    }
 
    button {
      font-size: 0.82rem;
      padding: 7px 18px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
 
    button:hover { background: #30363d; border-color: #58a6ff; }
 
    .share-btn { border-color: #238636; color: #3fb950; }
    .share-btn:hover { background: #0d2d1a; }
 
    /* Toast */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #238636;
      color: #fff;
      padding: 8px 22px;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
    .hax-logo {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 0.4rem;
    }
  </style>
</head>
<body>
 
<div class="container">
  <div class="hax-logo">⚽</div>
  <h1>HAXBALL TIER LIST</h1>
  <p class="subtitle">made by FoxSuS</p>
 
  <div id="tiers"></div>
 
  <div class="pool-section">
    <div class="pool-label">שחקנים לא מדורגים — גרור לטיר</div>
    <div class="pool-cells" id="pool" data-tier="pool"></div>
  </div>
 
  <div class="actions">
    <button onclick="resetAll()">🔄 איפוס</button>
  </div>
</div>
 
<div id="toast">הועתק ללוח!</div>
 
<script>
  const TIERS = ['S','A','B','C','D'];
  const PLAYERS = [
    'foxsus','kamikaza','lior','yarinov','noy',
    'lichboy','sharxzy','aceone','liam','yoda',
    'kipodi','david irl','coconut_ganster1',
    'eveyatar','lavihou','orian','amitgvg','electro',
    'ohad','b3nz','flexbx','or','fuq','nevo_az','superbibi','snoobi','mr.lux','ohad'
  ];
 
  let state = { S:[], A:[], B:[], C:[], D:[], pool:[...PLAYERS] };
 
  function saveState() {
    try { localStorage.setItem('haxball_tl_v1', JSON.stringify(state)); } catch(e) {}
  }
 
  function loadState() {
    try {
      const s = localStorage.getItem('haxball_tl_v1');
      if (s) {
        const parsed = JSON.parse(s);
        const allSaved = [...parsed.S||[],...parsed.A||[],...parsed.B||[],...parsed.C||[],...parsed.D||[],...parsed.pool||[]];
        const allCurrent = [...PLAYERS];
        const missing = allCurrent.filter(p => !allSaved.includes(p));
        if (missing.length) parsed.pool = [...(parsed.pool||[]), ...missing];
        state = parsed;
      }
    } catch(e) {}
  }
 
  function render() {
    const tiersEl = document.getElementById('tiers');
    tiersEl.innerHTML = '';
 
    TIERS.forEach(t => {
      const row = document.createElement('div');
      row.className = 'tier-row';
 
      const label = document.createElement('div');
      label.className = `tier-label tier-${t}`;
      label.textContent = t;
 
      const cells = document.createElement('div');
      cells.className = 'tier-cells';
      cells.dataset.tier = t;
      setupDropZone(cells);
      (state[t] || []).forEach(p => cells.appendChild(makeCard(p)));
 
      row.appendChild(label);
      row.appendChild(cells);
      tiersEl.appendChild(row);
    });
 
    const pool = document.getElementById('pool');
    pool.innerHTML = '';
    setupDropZone(pool);
    (state.pool || []).forEach(p => pool.appendChild(makeCard(p)));
  }
 
  function makeCard(name) {
    const el = document.createElement('div');
    el.className = 'player-card';
    el.textContent = name;
    el.draggable = true;
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', name);
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    return el;
  }
 
  function setupDropZone(el) {
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', e => {
      if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over');
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const name = e.dataTransfer.getData('text/plain');
      const dest = el.dataset.tier;
      removePlayer(name);
      if (dest === 'pool') state.pool.push(name);
      else state[dest].push(name);
      saveState();
      render();
    });
  }
 
  function removePlayer(name) {
    ['S','A','B','C','D','pool'].forEach(t => {
      state[t] = (state[t] || []).filter(p => p !== name);
    });
  }
 
  function resetAll() {
    if (!confirm('לאפס את כל הטיר ליסט?')) return;
    state = { S:[], A:[], B:[], C:[], D:[], pool:[...PLAYERS] };
    saveState();
    render();
  }
 
  function shareList() {
    let text = '⚽ HaxBall Tier List\n\n';
    const labels = { S:'🔴 S', A:'🟠 A', B:'🟡 B', C:'🟢 C', D:'🔵 D' };
    TIERS.forEach(t => {
      if ((state[t]||[]).length) {
        text += `${labels[t]}: ${state[t].join(', ')}\n`;
      }
    });
    if ((state.pool||[]).length) text += `\n❓ לא מדורג: ${state.pool.join(', ')}`;
    navigator.clipboard.writeText(text).catch(() => {});
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
 
  loadState();
  render();
</script>
</body>
</html>
